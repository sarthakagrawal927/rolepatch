name = "resume-tailor"
main = "worker.mjs"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat_v2"]

# Serve overlaid Astro index.html for GET / without invoking the Worker.
# Signed-in redirect is inline in landing-astro Layout.astro.
assets = { directory = ".open-next/assets", binding = "ASSETS", run_worker_first = [ "/*", "!/" ] }

routes = [
  { pattern = "rolepatch.com/*", zone_name = "rolepatch.com" },
  { pattern = "www.rolepatch.com/*", zone_name = "rolepatch.com" }
]

[observability]
enabled = true
head_sampling_rate = 0.1

[limits]
cpu_ms = 30000

[triggers]
crons = [
  # Hourly company-watch job discovery sync.
  "0 * * * *",
  # Weekly saved-search/apply-agent digest.
  "0 14 * * 1"
]

[[d1_databases]]
binding = "DB"
database_name = "rolepatch"
database_id = "6d29da06-bc98-44e0-b0b4-a2fc56c61226"

[vars]
NODE_ENV = "production"
# All AI traffic routes through free-ai-gateway (single Fleet-wide Workers AI
# chokepoint with daily Neuron budget). Override per-env if needed.
AI_BASE_URL = "https://ai-gateway.sassmaker.com/v1"
BETTER_AUTH_URL = "https://rolepatch.com"

# Browser Rendering binding — replaces broken puppeteer-core + @sparticuz/chromium.
# Available on Workers Paid plan. Used by src/lib/pdf.ts renderPdf().
[browser]
binding = "BROWSER"
