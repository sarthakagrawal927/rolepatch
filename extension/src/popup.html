<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>RolePatch</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        width: 320px;
      }
      body {
        padding: 16px;
        background: #ffffff;
        color: #111827;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #111827;
          color: #f9fafb;
        }
      }
      h1 {
        font-size: 15px;
        margin: 0 0 4px;
      }
      p.url {
        font-size: 11px;
        color: #6b7280;
        margin: 0 0 12px;
        word-break: break-all;
        max-height: 32px;
        overflow: hidden;
      }
      button {
        width: 100%;
        padding: 10px 12px;
        font-size: 14px;
        font-weight: 600;
        border-radius: 8px;
        border: 0;
        background: #4f46e5;
        color: #fff;
        cursor: pointer;
      }
      button:hover {
        background: #4338ca;
      }
      button.secondary {
        margin-top: 8px;
        background: transparent;
        border: 1px solid #d1d5db;
        color: inherit;
      }
      button.secondary:hover {
        background: rgba(107, 114, 128, 0.12);
      }
      button:disabled {
        background: #9ca3af;
        cursor: not-allowed;
      }
      .status {
        margin-top: 10px;
        font-size: 12px;
        min-height: 16px;
      }
      .status.error {
        color: #dc2626;
      }
      .status.success {
        color: #059669;
      }
      .settings {
        margin-top: 14px;
        padding-top: 10px;
        border-top: 1px solid rgba(0, 0, 0, 0.08);
        font-size: 11px;
      }
      .settings label {
        display: block;
        color: #6b7280;
        margin-bottom: 4px;
      }
      .settings input {
        width: 100%;
        padding: 6px 8px;
        font-size: 12px;
        border-radius: 6px;
        border: 1px solid #d1d5db;
        background: inherit;
        color: inherit;
        box-sizing: border-box;
      }
      .uploads {
        margin: 10px 0 4px;
        display: grid;
        gap: 8px;
      }
      .uploads label {
        display: block;
        font-size: 11px;
        color: #6b7280;
      }
      .uploads input {
        margin-top: 4px;
        width: 100%;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <h1>RolePatch job tools</h1>
    <p class="url" id="current-url">—</p>
    <button id="save-btn" class="secondary">Save to RolePatch queue</button>
    <button id="tailor-btn">Tailor with RolePatch</button>
    <div class="uploads">
      <label for="resume-file">
        Resume/CV file
        <input id="resume-file" type="file" accept=".pdf,.doc,.docx" />
      </label>
      <label for="cover-letter-file">
        Cover letter file
        <input id="cover-letter-file" type="file" accept=".pdf,.doc,.docx,.txt" />
      </label>
    </div>
    <button id="fill-btn" class="secondary">Fill application fields</button>
    <button id="submit-btn" class="secondary">Reviewed submit</button>
    <button id="capture-submit-btn" class="secondary">Capture submitted receipt</button>
    <div class="status" id="status"></div>

    <div class="settings">
      <label for="api-base">API base</label>
      <input id="api-base" type="url" placeholder="http://localhost:3000" />
    </div>

    <script src="popup.js"></script>
  </body>
</html>
