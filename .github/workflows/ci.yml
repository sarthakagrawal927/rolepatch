name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm test

      - run: pnpm build
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL || 'libsql://placeholder' }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN || 'placeholder' }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'placeholder-ci-secret' }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL || 'https://placeholder/v1' }}
          AI_API_KEY: ${{ secrets.AI_API_KEY || 'placeholder' }}
          AI_MODEL: auto
